<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Checkout | Arhaan Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'DM Sans', sans-serif; background: #f8fafc; color: #1a1a1a; }
      nav { display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 64px; background: #fff; border-bottom: 1px solid #e5e7eb; position: sticky; top: 0; z-index: 100; }
      .logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: #042C53; cursor: pointer; }
      .logo span { color: #378ADD; }
      .back-btn { background: #f8fafc; color: #042C53; border: 1px solid #e5e7eb; border-radius: 8px; padding: 8px 16px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; }
      .back-btn:hover { background: #E6F1FB; }
      .page-title { max-width: 820px; margin: 2rem auto; padding: 0 2rem; }
      .page-title h1 { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: #042C53; }
      .page-title p { font-size: 14px; color: #6b7280; margin-top: 4px; }
      .content { max-width: 820px; margin: 0 auto; padding: 0 2rem 4rem; display: grid; grid-template-columns: 1fr 320px; gap: 1.5rem; align-items: start; }
      .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; padding: 1.5rem; margin-bottom: 1.25rem; }
      .card h2 { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; color: #042C53; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid #f1f5f9; }
      .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
      .cart-item:last-child { border-bottom: none; }
      .cart-item-name { color: #374151; font-weight: 500; }
      .cart-item-price { color: #185FA5; font-family: 'Syne', sans-serif; font-weight: 700; }
      .cart-empty { text-align: center; padding: 2rem; color: #9ca3af; font-size: 14px; }
      .form-group { margin-bottom: 1rem; }
      .form-group label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
      .form-group input { width: 100%; padding: 11px 14px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 15px; font-family: 'DM Sans', sans-serif; color: #1a1a1a; outline: none; transition: border-color 0.2s; background: #fff; }
      .form-group input:focus { border-color: #378ADD; }
      .sticky-card { position: sticky; top: 80px; }
      .order-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; padding: 1.5rem; }
      .order-card h2 { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; color: #042C53; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid #f1f5f9; }
      .order-row { display: flex; justify-content: space-between; font-size: 14px; color: #6b7280; margin-bottom: 8px; }
      .order-total { display: flex; justify-content: space-between; font-size: 18px; font-family: 'Syne', sans-serif; font-weight: 800; color: #042C53; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #e5e7eb; }
      .btn-place { width: 100%; padding: 14px; border: none; border-radius: 10px; background: #042C53; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 1rem; transition: background 0.2s; }
      .btn-place:hover { background: #185FA5; }
      .secure-note { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 12px; color: #9ca3af; margin-top: 10px; }
      footer { background: #021d38; color: #85B7EB; text-align: center; padding: 1.5rem 2rem; font-size: 13px; }
      .footer-logo { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 6px; }
      .footer-logo span { color: #378ADD; }
    </style>
  </head>
  <body>

    <nav>
      <div class="logo" onclick="window.location.href='index.html'">Arhaan<span>Tech</span></div>
      <button class="back-btn" onclick="window.location.href='index.html'">← Back to Shop</button>
    </nav>

    <div class="page-title">
      <h1>Checkout</h1>
      <p>Review your order and enter delivery details</p>
    </div>

    <div class="content">
      <div>
        <!-- Cart Items -->
        <div class="card">
          <h2>Your Order</h2>
          <div id="cart-items"><div class="cart-empty">Your cart is empty</div></div>
        </div>

        <!-- Customer Details -->
        <div class="card">
          <h2>Delivery Details</h2>
          <div class="form-group">
            <label>Full Name</label>
            <input id="name" type="text" placeholder="Enter your full name" required />
          </div>
          <div class="form-group">
            <label>Delivery Address</label>
            <input id="address" type="text" placeholder="House no, street, city, state" required />
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input id="phone" type="tel" placeholder="+91 00000 00000" required />
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input id="email" type="email" placeholder="your@email.com" required />
          </div>
        </div>
      </div>

      <!-- Order Summary -->
      <div class="sticky-card">
        <div class="order-card">
          <h2>Order Summary</h2>
          <div id="order-summary-items"></div>
          <div class="order-total">
            <span>Total</span>
            <span id="cart-total">₹0</span>
          </div>
          <button class="btn-place" type="button" onclick="placeOrder()" id="place-order-btn">
            Place Order
          </button>
          <div class="secure-note">🔒 Safe & secure checkout</div>
        </div>
      </div>
    </div>

    <footer>
      <div class="footer-logo">Arhaan<span>Tech</span> Innovations</div>
      <p>© 2026 Arhaan Tech Innovations · Handmade with ❤️ in Indore</p>
    </footer>

    <script type="module" src="cart.js"></script>
    <script type="module" src="webhook.js"></script>
    <script type="module" src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script type="module">
      // Load cart into checkout page
      function loadCheckoutCart() {
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        const itemsEl = document.getElementById("cart-items");
        const summaryEl = document.getElementById("order-summary-items");
        const totalEl = document.getElementById("cart-total");
        let total = 0;

        if (cart.length === 0) {
          itemsEl.innerHTML = '<div class="cart-empty">Your cart is empty</div>';
          summaryEl.innerHTML = '';
          totalEl.textContent = "₹0";
          return;
        }

        itemsEl.innerHTML = cart.map(item => `
          <div class="cart-item">
            <span class="cart-item-name">${item.name}</span>
            <span class="cart-item-price">₹${item.price}</span>
          </div>
        `).join('');

        summaryEl.innerHTML = cart.map(item => {
          total += item.price;
          return `<div class="order-row"><span>${item.name}</span><span>₹${item.price}</span></div>`;
        }).join('');

        totalEl.textContent = "₹" + total;
      }

      loadCheckoutCart();

      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyBsvQD_h8-UCpt3FjcJC5rCFkoGagCmZo4",
    authDomain: "arhaan-tech.firebaseapp.com",
    projectId: "arhaan-tech",
    storageBucket: "arhaan-tech.firebasestorage.app",
    messagingSenderId: "378370431321",
    appId: "1:378370431321:web:c3e01ee291112ec24e9448"
  });

  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) return;
    const snap = await getDoc(doc(db, 'customers', user.uid));
    if (snap.exists()) {
      const data = snap.data();
      if (data.name) document.getElementById('name').value = data.name;
      if (data.phone) document.getElementById('phone').value = data.phone;
      if (data.address) document.getElementById('address').value = data.address;
      if (data.email) document.getElementById('email').value = data.email;
    }
  });
    </script>
  </body>
</html>

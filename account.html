<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account | Arhaan Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
    <link rel="icon" href="data:,">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'DM Sans', sans-serif; background: #f8fafc; color: #1a1a1a; min-height: 100vh; display: flex; flex-direction: column; }
      nav { display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 64px; background: #fff; border-bottom: 1px solid #e5e7eb; }
      .logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: #042C53; cursor: pointer; }
      .logo span { color: #378ADD; }
      .back-btn { background: #f8fafc; color: #042C53; border: 1px solid #e5e7eb; border-radius: 8px; padding: 8px 16px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; }
      .back-btn:hover { background: #E6F1FB; }
      main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 2rem; }
      .auth-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px; }
      .auth-card h1 { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: #042C53; margin-bottom: 6px; }
      .auth-card .subtitle { font-size: 14px; color: #6b7280; margin-bottom: 2rem; }
      .tabs { display: flex; background: #f8fafc; border-radius: 10px; padding: 4px; margin-bottom: 2rem; }
      .tab { flex: 1; padding: 9px; text-align: center; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 8px; transition: all 0.2s; color: #6b7280; border: none; background: transparent; font-family: 'DM Sans', sans-serif; }
      .tab.active { background: #fff; color: #042C53; border: 1px solid #e5e7eb; }
      .form-group { margin-bottom: 1rem; }
      .form-group label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
      .form-group input { width: 100%; padding: 11px 14px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 15px; font-family: 'DM Sans', sans-serif; color: #1a1a1a; outline: none; transition: border-color 0.2s; background: #fff; }
      .form-group input:focus { border-color: #378ADD; }
      .form-group input::placeholder { color: #9ca3af; }
      .btn-submit { width: 100%; padding: 13px; border: none; border-radius: 10px; background: #042C53; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s; margin-top: 0.5rem; }
      .btn-submit:hover { background: #185FA5; }
      .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
      .divider { display: flex; align-items: center; gap: 12px; margin: 1.25rem 0; }
      .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }
      .divider span { font-size: 13px; color: #9ca3af; }
      .btn-google { width: 100%; padding: 12px; border: 1px solid #e5e7eb; border-radius: 10px; background: #fff; color: #1a1a1a; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; gap: 10px; transition: border-color 0.2s; }
      .btn-google:hover { border-color: #378ADD; }
      .message { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 1rem; display: none; }
      .message.error { background: #FEF2F2; border: 1px solid #FECACA; color: #991B1B; display: block; }
      .message.success { background: #F0FDF4; border: 1px solid #BBF7D0; color: #166534; display: block; }
      .switch-text { text-align: center; font-size: 13px; color: #6b7280; margin-top: 1.25rem; }
      .switch-text a { color: #378ADD; text-decoration: none; font-weight: 500; cursor: pointer; }
      footer { padding: 1.5rem; text-align: center; font-size: 13px; color: #6b7280; border-top: 1px solid #e5e7eb; background: #fff; }
    </style>
  </head>
  <body>

    <nav>
      <div class="logo" onclick="window.location.href='index.html'">Arhaan<span>Tech</span></div>
      <button class="back-btn" onclick="window.location.href='index.html'">← Back to Shop</button>
    </nav>

    <main>
      <div class="auth-card">
        <h1 id="auth-title">Create Account</h1>
        <p class="subtitle" id="auth-subtitle">Sign up to track your orders and save your details</p>

        <div class="tabs">
          <button class="tab active" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
          <button class="tab" id="tab-login" onclick="switchTab('login')">Log In</button>
        </div>

        <div class="message" id="message"></div>

        <div id="name-group" class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="Your full name" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="your@email.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Min 6 characters" />
        </div>

        <button class="btn-submit" id="submit-btn" onclick="handleAuth()">Create Account</button>

        <div class="divider"><span>or</span></div>
        <button class="btn-google" onclick="handleGoogle()">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 2.09 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>

        <p class="switch-text" id="switch-text">
          Already have an account? <a onclick="switchTab('login')">Log in</a>
        </p>
      </div>
    </main>

    <footer>© 2026 Arhaan Tech Innovations · Handmade with ❤️ in Indore</footer>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
      import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
      import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBsvQD_h8-UCpt3FjcJC5rCFkoGagCmZo4",
        authDomain: "arhaan-tech.firebaseapp.com",
        projectId: "arhaan-tech",
        storageBucket: "arhaan-tech.firebasestorage.app",
        messagingSenderId: "378370431321",
        appId: "1:378370431321:web:c3e01ee291112ec24e9448"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const provider = new GoogleAuthProvider();

      let currentTab = 'signup';

      let isSigningUp = false;

      // If already logged in redirect to profile
      onAuthStateChanged(auth, (user) => {
        if (user && !isSigningUp) window.location.href = 'profile.html';
      });

      async function createUserProfile(user, name) {
        console.log("Creating Firestore profile for:", user.uid);
        const userRef = doc(db, 'customers', user.uid);
        const existing = await getDoc(userRef);
        if (!existing.exists()) {
          await setDoc(userRef, {
            name: name || user.displayName || 'Customer',
            email: user.email,
            address: '',
            phone: '',
            createdAt: serverTimestamp()
          });
          console.log("Firestore profile created!");
        }
      }

      function showMessage(text, type) {
        const el = document.getElementById('message');
        el.textContent = text;
        el.className = 'message ' + type;
      }

      window.switchTab = function(tab) {
        currentTab = tab;
        const isSignup = tab === 'signup';
        document.getElementById('tab-signup').className = 'tab' + (isSignup ? ' active' : '');
        document.getElementById('tab-login').className = 'tab' + (!isSignup ? ' active' : '');
        document.getElementById('name-group').style.display = isSignup ? 'block' : 'none';
        document.getElementById('auth-title').textContent = isSignup ? 'Create Account' : 'Welcome Back';
        document.getElementById('auth-subtitle').textContent = isSignup ? 'Sign up to track your orders and save your details' : 'Log in to view your orders and saved details';
        document.getElementById('submit-btn').textContent = isSignup ? 'Create Account' : 'Log In';
        document.getElementById('switch-text').innerHTML = isSignup
          ? 'Already have an account? <a onclick="switchTab(\'login\')">Log in</a>'
          : 'No account yet? <a onclick="switchTab(\'signup\')">Sign up free</a>';
        document.getElementById('message').className = 'message';
      }

      window.handleAuth = async function() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const name = document.getElementById('name').value.trim();
        const btn = document.getElementById('submit-btn');

        if (!email || !password) { showMessage('Please fill all fields!', 'error'); return; }
        if (currentTab === 'signup' && !name) { showMessage('Please enter your name!', 'error'); return; }
        if (password.length < 6) { showMessage('Password must be at least 6 characters!', 'error'); return; }

        btn.disabled = true;
        btn.textContent = currentTab === 'signup' ? 'Creating account...' : 'Logging in...';

        try {
          if (currentTab === 'signup') {
            isSigningUp = true;
            const cred = await createUserWithEmailAndPassword(auth, email, password);
            await updateProfile(cred.user, { displayName: name });
            await createUserProfile(cred.user, name);
            showMessage('Account created! Redirecting...', 'success');
          } else {
            await signInWithEmailAndPassword(auth, email, password);
            showMessage('Logged in! Redirecting...', 'success');
          }
          setTimeout(() => window.location.href = 'profile.html', 1500);
        } catch (err) {
          let msg = 'Something went wrong. Try again!';
          if (err.code === 'auth/email-already-in-use') msg = 'Email already in use. Try logging in!';
          if (err.code === 'auth/user-not-found') msg = 'No account found. Sign up first!';
          if (err.code === 'auth/wrong-password') msg = 'Wrong password. Try again!';
          if (err.code === 'auth/invalid-credential') msg = 'Wrong email or password!';
          if (err.code === 'auth/invalid-email') msg = 'Invalid email address!';
          showMessage(msg, 'error');
          btn.disabled = false;
          btn.textContent = currentTab === 'signup' ? 'Create Account' : 'Log In';
        }
      }

      window.handleGoogle = async function() {
        try {
          const result = await signInWithPopup(auth, provider);
          try { await createUserProfile(result.user, result.user.displayName); } catch(e) {}
          showMessage('Signed in! Redirecting...', 'success');
          setTimeout(() => window.location.href = 'profile.html', 1500);
        } catch (err) {
          showMessage('Google sign in failed. Try again!', 'error');
        }
      }
    </script>

  </body>
</html>

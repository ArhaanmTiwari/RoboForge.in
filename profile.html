<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Account | RoboForge.in</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
    <link rel="icon" href="data:,">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'DM Sans', sans-serif; background: #090D18; color: #F1F5F9; min-height: 100vh; }
      nav { display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 64px; background: #0D1525; border-bottom: 1px solid #1E2D45; position: sticky; top: 0; z-index: 100; }
      .logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: #F1F5F9; letter-spacing: -0.5px; cursor: pointer; }
      .logo span { color: #FF5722; }
      .nav-right { display: flex; align-items: center; gap: 10px; }
      .btn-shop { background: #FF5722; color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; }
      .btn-shop:hover { background: #E64A19; }
      .btn-logout { background: #162035; color: #94A3B8; border: 1px solid #1E2D45; border-radius: 8px; padding: 8px 16px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; }
      .btn-logout:hover { color: #F1F5F9; border-color: #FF5722; }
      #loading { display: flex; align-items: center; justify-content: center; height: 60vh; font-size: 16px; color: #94A3B8; }
      #main { display: none; max-width: 900px; margin: 0 auto; padding: 2.5rem 2rem; }
      .welcome { margin-bottom: 2rem; }
      .welcome h1 { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: #F1F5F9; margin-bottom: 4px; }
      .welcome p { font-size: 14px; color: #94A3B8; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2.5rem; }
      .card { background: #111C2E; border: 1px solid #1E2D45; border-radius: 16px; padding: 1.5rem; }
      .card h2 { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; color: #F1F5F9; margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 1px solid #1E2D45; }
      .form-group { margin-bottom: 1rem; }
      .form-group label { display: block; font-size: 13px; font-weight: 500; color: #CBD5E1; margin-bottom: 6px; }
      .form-group input { width: 100%; padding: 10px 14px; border: 1px solid #1E2D45; border-radius: 10px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: #F1F5F9; outline: none; transition: border-color 0.2s; background: #162035; }
      .form-group input:focus { border-color: #FF5722; }
      .form-group input::placeholder { color: #64748B; }
      .btn-save { width: 100%; padding: 11px; border: none; border-radius: 10px; background: #FF5722; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s; }
      .btn-save:hover { background: #E64A19; }
      .saved-msg { font-size: 13px; color: #86EFAC; margin-top: 8px; text-align: center; display: none; }
      .saved-msg.show { display: block; }
      .info-row { display: flex; justify-content: space-between; font-size: 14px; padding: 8px 0; border-bottom: 1px solid #1E2D45; }
      .info-row:last-child { border-bottom: none; }
      .info-row .label { color: #94A3B8; }
      .info-row .value { font-weight: 500; color: #F1F5F9; }
      .orders-section h2 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: #F1F5F9; margin-bottom: 1.25rem; }
      .order-card { background: #111C2E; border: 1px solid #1E2D45; border-radius: 16px; padding: 1.5rem; margin-bottom: 1.25rem; }
      .order-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid #1E2D45; flex-wrap: wrap; gap: 8px; }
      .order-id { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: #22D3EE; }
      .order-date { font-size: 13px; color: #94A3B8; }
      .status-badge { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 100px; }
      .status-received { background: #0A1F35; color: #22D3EE; border: 1px solid #22D3EE; }
      .status-processing { background: #2D1F0A; color: #FCD34D; border: 1px solid #F59E0B; }
      .status-shipped { background: #0D2D1A; color: #86EFAC; border: 1px solid #22C55E; }
      .status-delivered { background: #0D2D1A; color: #4ADE80; border: 1px solid #16A34A; }
      .order-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
      .order-row .lbl { color: #94A3B8; }
      .order-row .val { font-weight: 500; color: #CBD5E1; max-width: 300px; text-align: right; }
      .order-total { display: flex; justify-content: space-between; font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; color: #FF5722; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #1E2D45; }
      .empty-orders { text-align: center; padding: 3rem; color: #64748B; font-size: 15px; background: #111C2E; border: 1px solid #1E2D45; border-radius: 16px; }
      .empty-orders a { color: #FF5722; text-decoration: none; font-weight: 500; }
      footer { background: #060B14; color: #64748B; text-align: center; padding: 1.5rem 2rem; font-size: 13px; margin-top: 3rem; border-top: 1px solid #1E2D45; }
      .footer-logo { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: #F1F5F9; margin-bottom: 6px; }
      .footer-logo span { color: #FF5722; }
      @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>

    <nav>
      <div class="logo" onclick="window.location.href='index.html'">Robo<span>Forge.in</span></div>
      <div class="nav-right">
        <button class="btn-shop" onclick="window.location.href='index.html'">← Shop</button>
        <button class="btn-logout" id="logout-btn">Log Out</button>
      </div>
    </nav>

    <div id="loading">Loading your account...</div>

    <div id="main">
      <div class="welcome">
        <h1>My Account 👋</h1>
        <p id="welcome-sub">Welcome back!</p>
      </div>

      <div class="grid">
        <!-- Account Info -->
        <div class="card">
          <h2>Account Info</h2>
          <div class="info-row"><span class="label">Name</span><span class="value" id="info-name">—</span></div>
          <div class="info-row"><span class="label">Email</span><span class="value" id="info-email">—</span></div>
          <div class="info-row"><span class="label">Member since</span><span class="value" id="info-since">—</span></div>
        </div>

        <!-- Saved Address -->
        <div class="card">
          <h2>Saved Delivery Details</h2>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="saved-name" placeholder="Your full name" />
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="saved-phone" placeholder="+91 00000 00000" />
          </div>
          <div class="form-group">
            <label>Delivery Address</label>
            <input type="text" id="saved-address" placeholder="House no, street, city" />
          </div>
          <button class="btn-save" onclick="saveDetails()">Save Details</button>
          <div class="saved-msg" id="saved-msg">✅ Details saved!</div>
        </div>
      </div>

      <!-- Order History -->
      <div class="orders-section">
        <h2>Order History</h2>
        <div id="orders-list"></div>
      </div>
    </div>

    <footer>
      <div class="footer-logo">Robo<span>Forge.in</span></div>
      <p>© 2026 RoboForge.in · Handmade with ❤️ in Indore</p>
    </footer>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
      import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
      import { getFirestore, doc, getDoc, updateDoc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBsvQD_h8-UCpt3FjcJC5rCFkoGagCmZo4",
        authDomain: "arhaan-tech.firebaseapp.com",
        projectId: "arhaan-tech",
        storageBucket: "arhaan-tech.firebasestorage.app",
        messagingSenderId: "378370431321",
        appId: "1:378370431321:web:c3e01ee291112ec24e9448"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      let currentUser = null;

      onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'account.html'; return; }
        currentUser = user;

        // Load user profile
        const snap = await getDoc(doc(db, 'customers', user.uid));
        const data = snap.exists() ? snap.data() : {};

        // Update account info
        document.getElementById('welcome-sub').textContent = 'Welcome back, ' + (data.name || user.displayName || 'Customer') + '!';
        document.getElementById('info-name').textContent = data.name || user.displayName || '—';
        document.getElementById('info-email').textContent = user.email;
        document.getElementById('info-since').textContent = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : '—';

        // Prefill saved details
        if (data.address) document.getElementById('saved-address').value = data.address;
        if (data.phone) document.getElementById('saved-phone').value = data.phone;
        if (data.name) document.getElementById('saved-name').value = data.name;

        // Load orders
        await loadOrders(user.email);

        document.getElementById('loading').style.display = 'none';
        document.getElementById('main').style.display = 'block';
      });

      async function loadOrders(email) {
        try {
          const q = query(collection(db, 'orders'), where('email', '==', email));
          const snapshot = await getDocs(q);

          if (snapshot.empty) {
            document.getElementById('orders-list').innerHTML = `
              <div class="empty-orders">
                No orders yet! <a href="index.html">Start shopping →</a>
              </div>`;
            return;
          }

          const orders = [];
          snapshot.forEach(doc => orders.push(doc.data()));

          // Sort newest first
          orders.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

          document.getElementById('orders-list').innerHTML = orders.map(o => {
            const date = o.createdAt ? new Date(o.createdAt.seconds * 1000).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : 'Recently';
            const statusClass = {
              'Received': 'status-received',
              'Processing': 'status-processing',
              'Shipped': 'status-shipped',
              'Delivered': 'status-delivered'
            }[o.status] || 'status-received';

            return `
              <div class="order-card">
                <div class="order-header">
                  <div>
                    <div class="order-id">${o.orderId}</div>
                    <div class="order-date">${date}</div>
                  </div>
                  <span class="status-badge ${statusClass}">${o.status || 'Received'}</span>
                </div>
                <div class="order-row"><span class="lbl">Items</span><span class="val">${o.items}</span></div>
                <div class="order-row"><span class="lbl">Delivery to</span><span class="val">${o.address}</span></div>
                <div class="order-total"><span>Total</span><span>₹${o.total}</span></div>
              </div>`;
          }).join('');
        } catch (err) {
          console.error(err);
          document.getElementById('orders-list').innerHTML = '<div class="empty-orders">Could not load orders. Please try again!</div>';
        }
      }

      window.saveDetails = async function() {
        if (!currentUser) return;
        const name = document.getElementById('saved-name').value.trim();
        const phone = document.getElementById('saved-phone').value.trim();
        const address = document.getElementById('saved-address').value.trim();

        try {
          await setDoc(doc(db, 'customers', currentUser.uid), { name, phone, address }, { merge: true });
          const msg = document.getElementById('saved-msg');
          msg.classList.add('show');
          setTimeout(() => msg.classList.remove('show'), 3000);
        } catch (err) {
          console.error(err);
        }
      }

      document.getElementById('logout-btn').addEventListener('click', async () => {
        await signOut(auth);
        window.location.href = 'index.html';
      });
    </script>

  </body>
</html>
